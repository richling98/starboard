name: Starboard Index

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

concurrency:
  group: starboard-index
  cancel-in-progress: false

jobs:
  index-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      STARBOARD_MAX_QUERIES: "18"
      STARBOARD_MAX_PAGES: "1"
      STARBOARD_README_LIMIT: "0"
      STARBOARD_DISCOVERY_REQUEST_TIMEOUT_MS: "10000"
      STARBOARD_LANGUAGE_LIMIT: "500"
      STARBOARD_SEMANTIC_LIMIT: "500"
      STARBOARD_SEMANTIC_BATCH_SIZE: "50"
      STARBOARD_README_CHAR_LIMIT: "8000"
      STARBOARD_EMBEDDING_RETRY_CHAR_LIMIT: "6000"
      STARBOARD_EMBEDDING_MODEL: "text-embedding-3-small"
      STARBOARD_EMBEDDING_DIMENSIONS: "1024"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run setup:db
        env:
          DATABASE_URL: ${{ secrets.STARBOARD_DATABASE_URL }}
      - run: npm run discover:repos
        if: github.event_name != 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.STARBOARD_GITHUB_TOKEN }}
          DATABASE_URL: ${{ secrets.STARBOARD_DATABASE_URL }}
      - run: npm run refine:language
        if: github.event_name != 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.STARBOARD_GITHUB_TOKEN }}
          DATABASE_URL: ${{ secrets.STARBOARD_DATABASE_URL }}
      - run: npm run build:semantic-index
        if: github.event_name != 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.STARBOARD_GITHUB_TOKEN }}
          DATABASE_URL: ${{ secrets.STARBOARD_DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.STARBOARD_OPENAI_API_KEY }}
      - run: npm run refresh:all-time-accounts
        if: github.event_name != 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.STARBOARD_GITHUB_TOKEN }}
          DATABASE_URL: ${{ secrets.STARBOARD_DATABASE_URL }}
      - run: npm run build:snapshots
        if: github.event_name != 'push'
        env:
          DATABASE_URL: ${{ secrets.STARBOARD_DATABASE_URL }}
      - run: npm run export:static-data
        env:
          DATABASE_URL: ${{ secrets.STARBOARD_DATABASE_URL }}
      - name: Commit refreshed leaderboard data
        if: github.event_name != 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/leaderboards/
          git diff --cached --quiet || git commit -m "chore: refresh leaderboard data [skip ci]"
          git push
